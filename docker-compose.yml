version: '3.7'

services:
  # Base de Datos
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake

  # Redis para cola de tareas
  redis-queue:
    image: redis:6.2-alpine
    volumes:
      - redis-queue-data:/data

  # Redis para cache
  redis-cache:
    image: redis:6.2-alpine
    volumes:
      - redis-cache-data:/data

  # Redis para socketio (comunicación en tiempo real)
  redis-socketio:
    image: redis:6.2-alpine
    volumes:
      - redis-socket-data:/data

  # Servidor Backend principal
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: erpnext-laboratorio:latest
    environment:
      - DB_HOST=db
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - REDIS_SOCKETIO=redis-socketio:6379
    volumes:
      - assets-data:/home/frappe/frappe-bench/sites/assets
      - sites-data:/home/frappe/frappe-bench/sites
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis-cache
      - redis-queue
      - redis-socketio

  # Workers para tareas asíncronas
  worker-default:
    image: erpnext-laboratorio:latest
    command: bench worker --queue default
    environment:
      - DB_HOST=db
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend

  worker-short:
    image: erpnext-laboratorio:latest
    command: bench worker --queue short
    environment:
      - DB_HOST=db
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend

  worker-long:
    image: erpnext-laboratorio:latest
    command: bench worker --queue long
    environment:
      - DB_HOST=db
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend

  # Programador de tareas (cron jobs internos)
  scheduler:
    image: erpnext-laboratorio:latest
    command: bench schedule
    environment:
      - DB_HOST=db
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - backend

volumes:
  db-data:
  redis-queue-data:
  redis-cache-data:
  redis-socket-data:
  assets-data:
  sites-data:
