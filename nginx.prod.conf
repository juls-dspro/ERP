upstream frappe-backend {
    server backend:8000;
}

upstream frappe-websocket {
    server backend:9000;
}

server {
    listen 80;
    server_name localhost; # Se reemplazará por el dominio del usuario en la VM

    # Logs
    access_log /var/log/nginx/frappe_access.log;
    error_log /var/log/nginx/frappe_error.log;

    # Certbot challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirección a HTTPS de producción (descomentar después de generar certificados)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Configuración temporal para HTTP / fallback
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_pass http://frappe-backend;
    }

    # WebSockets (Socket.io)
    location /socket.io {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://frappe-websocket;
    }

    # Assets estáticos
    location /assets {
        alias /var/www/html/assets;
        try_files $uri =404;
    }
}
